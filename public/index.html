<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plán party 👷</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #f0ece4;
    --ink: #1a1814;
    --muted: #8a8278;
    --line: #c8c2b8;
    --white: #faf8f4;
    --err: #c0392b;
    --accent: #d4a800;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; padding: 20px 14px 60px;
  }

  header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(20px, 4vw, 28px); font-weight: 800; letter-spacing: -1px; }
  .mode-badge {
    font-size: 11px; padding: 3px 10px; border-radius: 99px;
    font-weight: 500; letter-spacing: .5px; text-transform: uppercase;
  }
  .mode-badge.public { background: #e0dcd4; color: var(--muted); }
  .mode-badge.admin  { background: var(--accent); color: #1a1814; }

  .week-nav { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .week-nav button {
    background: var(--ink); color: var(--bg); border: none;
    padding: 6px 12px; font-family: 'DM Mono', monospace; font-size: 12px;
    cursor: pointer; border-radius: 3px;
  }
  .week-nav button:hover { opacity: .8; }
  .week-label { font-size: 12px; color: var(--muted); min-width: 170px; text-align: center; }

  .login-strip { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .login-strip input {
    font-family: 'DM Mono', monospace; font-size: 13px;
    border: 1px solid var(--line); border-radius: 4px;
    padding: 6px 12px; background: var(--white); color: var(--ink); width: 180px;
  }
  .login-strip input:focus { outline: 2px solid var(--accent); }

  .toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }

  .btn {
    font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 6px 14px; border-radius: 3px; cursor: pointer;
    border: 1px solid transparent; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-secondary { background: none; border-color: var(--line); color: var(--ink); }
  .btn-save { background: var(--accent); color: #1a1814; font-weight: 500; }
  .btn-save.dirty { background: #ff8c00; color: #fff; }
  .btn-sm { padding: 2px 7px; font-size: 10px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--bg); padding: 10px 20px;
    border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity .3s;
    z-index: 500; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.err { background: var(--err); }

  .legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; align-items: center; }
  .legend-item {
    display: flex; align-items: center; gap: 6px; font-size: 12px;
    background: var(--white); border: 1px solid var(--line);
    border-radius: 4px; padding: 4px 10px;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .grid-wrapper {
    overflow-x: auto; border-radius: 6px;
    border: 1px solid var(--line); background: var(--white);
    margin-bottom: 14px; -webkit-overflow-scrolling: touch;
  }
  table { border-collapse: collapse; min-width: 760px; width: 100%; }

  thead th {
    position: sticky; top: 0; z-index: 10;
    background: var(--ink); color: var(--bg);
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: .5px;
    padding: 9px 6px; text-align: center;
    border-right: 1px solid #333; white-space: nowrap;
  }
  thead th:first-child {
    text-align: left; padding-left: 14px;
    position: sticky; left: 0; z-index: 20; min-width: 130px;
  }
  .day-weekend { background: #2a2824 !important; }
  .day-today { outline: 2px solid var(--accent); outline-offset: -2px; }

  tbody tr { border-bottom: 1px solid var(--line); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: #f5f1ea; }

  td { padding: 0; border-right: 1px solid var(--line); vertical-align: middle; text-align: center; }
  td:last-child { border-right: none; }

  td.worker-name {
    position: sticky; left: 0; z-index: 5;
    background: var(--white); text-align: left;
    padding: 8px 12px; font-size: 13px; font-weight: 500;
    white-space: nowrap; border-right: 2px solid var(--line);
  }
  tbody tr:nth-child(even) td.worker-name { background: #f5f1ea; }

  /* Cell - holds either single block or split AM/PM */
  .cell-wrap {
    width: 50px; height: 46px;
    display: flex; align-items: center; justify-content: center;
    padding: 4px;
  }
  .cell {
    width: 42px; height: 38px;
    border-radius: 5px; overflow: hidden;
    display: flex; user-select: none;
    transition: filter .1s, transform .1s;
    background: #e0dcd4;
  }
  .cell.editable { cursor: pointer; }
  .cell.editable:hover { filter: brightness(.88); transform: scale(1.05); }

  .cell-half {
    flex: 1; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 500; color: #fff;
    overflow: hidden; padding: 0 2px; text-align: center;
    line-height: 1.1;
  }
  .cell-half.empty { background: #e0dcd4; color: var(--muted); }
  .cell.full .cell-half { font-size: 10px; }

  .cell-divider { width: 1px; background: rgba(255,255,255,.5); }

  /* Picker dropdown */
  .picker {
    position: fixed; z-index: 400;
    background: var(--white); border: 1px solid var(--ink);
    border-radius: 6px; box-shadow: 4px 4px 0 var(--ink);
    overflow: hidden; min-width: 170px;
    animation: popIn .12s ease;
  }
  @keyframes popIn { from{opacity:0;transform:translateX(-50%) scale(.92)} to{opacity:1;transform:translateX(-50%) scale(1)} }

  .picker-section { border-bottom: 1px solid var(--line); padding: 6px 0; }
  .picker-section:last-child { border-bottom: none; }
  .picker-label {
    padding: 4px 12px; font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .5px;
  }
  .picker-item {
    padding: 7px 14px; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 8px; transition: background .1s;
  }
  .picker-item:hover { background: var(--bg); }
  .picker-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .picker-split-icon {
    width: 14px; height: 12px; display: inline-block; flex-shrink: 0;
    border: 1px solid var(--ink); border-radius: 2px;
    background: linear-gradient(90deg, var(--accent) 50%, #2d6a4f 50%);
  }

  /* Summary row */
  .summary-row td {
    font-size: 11px; color: var(--muted);
    padding: 6px 4px; text-align: center;
    border-top: 2px solid var(--line);
  }
  .summary-row td:first-child {
    text-align: left; padding-left: 14px;
    font-size: 12px; font-weight: 500; color: var(--ink);
    position: sticky; left: 0; background: var(--white); z-index: 5;
  }
  .count-badge {
    display: inline-block; background: var(--ink); color: var(--bg);
    border-radius: 3px; padding: 1px 5px; font-size: 10px;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 300;
  }
  .modal {
    background: var(--white); border: 1px solid var(--ink);
    border-radius: 8px; box-shadow: 6px 6px 0 var(--ink);
    padding: 24px; min-width: 280px; max-width: 95vw;
  }
  .modal h2 { font-family: 'Syne', sans-serif; font-size: 18px; margin-bottom: 16px; }
  .modal input {
    width: 100%; font-family: 'DM Mono', monospace; font-size: 13px;
    border: 1px solid var(--line); border-radius: 4px; padding: 7px 10px;
    background: var(--bg); color: var(--ink); margin-bottom: 10px;
  }
  .modal label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .color-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; max-width: 320px; }
  .color-swatch {
    width: 26px; height: 26px; border-radius: 4px; cursor: pointer;
    border: 2px solid transparent;
    transition: transform .12s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--ink); }

  .footer-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
  .footer-info { font-size: 11px; color: var(--muted); }

  /* ─── TODO section ─── */
  .todo-section {
    margin-top: 32px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 18px;
  }
  .todo-header {
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .todo-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 800; letter-spacing: -.5px;
  }
  .todo-counter {
    font-size: 11px; color: var(--muted);
  }
  .todo-clear-btn {
    margin-left: auto;
    background: none; border: 1px solid var(--line); color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 4px 10px; border-radius: 3px; cursor: pointer;
  }
  .todo-clear-btn:hover { color: var(--err); border-color: var(--err); }

  .todo-add-row {
    display: flex; gap: 8px; margin-bottom: 14px;
  }
  .todo-add-row input {
    flex: 1;
    font-family: 'DM Mono', monospace; font-size: 13px;
    border: 1px solid var(--line); border-radius: 4px;
    padding: 8px 12px; background: var(--bg); color: var(--ink);
  }
  .todo-add-row input:focus { outline: 2px solid var(--accent); border-color: transparent; }

  .todo-list { display: flex; flex-direction: column; gap: 4px; }

  .todo-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: 4px;
    transition: background .15s;
    border: 1px solid transparent;
  }
  .todo-item:hover { background: var(--bg); }
  .todo-item.done { opacity: .55; }
  .todo-item.done .todo-text { text-decoration: line-through; color: var(--muted); }

  .todo-checkbox {
    width: 20px; height: 20px;
    border: 2px solid var(--line); border-radius: 4px;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .12s;
    background: var(--white);
  }
  .todo-checkbox:hover { border-color: var(--ink); }
  .todo-checkbox.checked {
    background: var(--accent); border-color: var(--accent);
    color: #1a1814; font-weight: bold; font-size: 14px; line-height: 1;
  }

  .todo-text {
    flex: 1; font-size: 13px; line-height: 1.4;
    word-break: break-word;
    cursor: default;
  }
  .todo-text.editable { cursor: text; }
  .todo-text-input {
    flex: 1;
    font-family: 'DM Mono', monospace; font-size: 13px;
    border: 1px solid var(--accent); border-radius: 3px;
    padding: 4px 8px; background: var(--white); color: var(--ink);
  }

  .todo-meta {
    font-size: 10px; color: var(--muted);
    white-space: nowrap; flex-shrink: 0;
  }

  .todo-delete-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 16px; line-height: 1;
    padding: 2px 6px; border-radius: 3px;
    flex-shrink: 0;
    transition: all .12s;
  }
  .todo-delete-btn:hover { color: var(--err); background: rgba(192,57,43,.1); }

  .todo-empty {
    text-align: center; padding: 20px; color: var(--muted);
    font-size: 12px; font-style: italic;
  }

  .todo-busy { opacity: .5; pointer-events: none; }

  /* ─── Assignees: chips, multiselect ─── */
  .assignee-row {
    display: flex; flex-wrap: wrap; gap: 4px;
    align-items: center; padding-left: 30px;
    margin-top: 2px;
  }
  .assignee-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: #ede9e0; color: var(--ink);
    border: 1px solid var(--line); border-radius: 99px;
    padding: 2px 8px; font-size: 10px;
    line-height: 1.4;
  }
  .assignee-chip.removable {
    cursor: default;
  }
  .assignee-chip-x {
    cursor: pointer; opacity: .5;
    font-weight: bold; padding: 0 2px;
    transition: opacity .12s, color .12s;
  }
  .assignee-chip-x:hover { opacity: 1; color: var(--err); }
  .assignee-chip.orphan {
    background: #f4ece0;
    color: var(--muted);
    font-style: italic;
  }
  .assignee-chip.orphan::before {
    content: '⚐';
    margin-right: 2px;
  }

  .assignee-add-btn {
    background: none; border: 1px dashed var(--line);
    color: var(--muted); border-radius: 99px;
    padding: 1px 8px; font-size: 10px; cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all .12s;
  }
  .assignee-add-btn:hover { border-color: var(--ink); color: var(--ink); border-style: solid; }

  /* Multiselect dropdown */
  .ms-dropdown {
    position: fixed; z-index: 400;
    background: var(--white); border: 1px solid var(--ink);
    border-radius: 6px; box-shadow: 4px 4px 0 var(--ink);
    overflow: hidden; min-width: 180px; max-width: 260px;
    max-height: 280px; display: flex; flex-direction: column;
    animation: popIn .12s ease;
  }
  .ms-list {
    overflow-y: auto; max-height: 200px;
    padding: 4px 0;
  }
  .ms-item {
    padding: 6px 12px; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background .1s;
  }
  .ms-item:hover { background: var(--bg); }
  .ms-checkbox {
    width: 14px; height: 14px;
    border: 1.5px solid var(--line); border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--white); flex-shrink: 0;
    font-size: 10px; line-height: 1; font-weight: bold;
  }
  .ms-checkbox.checked {
    background: var(--accent); border-color: var(--accent); color: #1a1814;
  }
  .ms-empty {
    padding: 12px; text-align: center; font-size: 11px;
    color: var(--muted); font-style: italic;
  }
  .ms-footer {
    border-top: 1px solid var(--line); padding: 6px;
    display: flex; gap: 4px; align-items: center;
    background: var(--bg);
  }
  .ms-footer button {
    flex: 1; font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 4px 8px; border-radius: 3px; cursor: pointer;
    border: 1px solid var(--line); background: var(--white); color: var(--ink);
  }
  .ms-footer button:hover { border-color: var(--ink); }
  .ms-footer button.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  /* Manage assignees modal */
  .assignee-manage-list {
    display: flex; flex-direction: column; gap: 4px;
    margin-bottom: 12px; max-height: 240px; overflow-y: auto;
  }
  .assignee-manage-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; background: var(--bg);
    border-radius: 4px; font-size: 13px;
  }
  .assignee-manage-item button {
    margin-left: auto; background: none; border: none;
    color: var(--muted); cursor: pointer; font-size: 14px;
    padding: 0 4px; font-weight: bold;
  }
  .assignee-manage-item button:hover { color: var(--err); }
  .assignee-manage-empty {
    text-align: center; padding: 16px; color: var(--muted);
    font-size: 12px; font-style: italic;
  }

  .help-text {
    font-size: 11px; color: var(--muted); margin: 8px 0 14px; font-style: italic;
  }
</style>
</head>
<body>

<header>
  <h1>Plán party 👷</h1>
  <span class="mode-badge public" id="modeBadge">Veřejný pohled</span>
  <div class="week-nav">
    <button onclick="shiftWeek(-7)">◀ −7d</button>
    <button onclick="goToday()" title="Skočit na dnešek">●</button>
    <span class="week-label" id="weekLabel"></span>
    <button onclick="shiftWeek(7)">+7d ▶</button>
  </div>
</header>

<div class="login-strip" id="loginStrip">
  <input type="password" id="pwInput" placeholder="Heslo pro editaci…" onkeydown="if(event.key==='Enter')login()">
  <button class="btn btn-primary" onclick="login()">Přihlásit</button>
</div>

<div class="toolbar" id="adminToolbar" style="display:none">
  <button class="btn btn-secondary" onclick="openModal('worker')">+ Přidat člověka</button>
  <button class="btn btn-secondary" onclick="openModal('stavba')">+ Přidat stavbu</button>
  <button class="btn btn-save" id="saveBtn" onclick="saveToServer()">💾 Uložit změny</button>
  <button class="btn btn-secondary" onclick="logout()" style="margin-left:auto">Odhlásit</button>
</div>

<p class="help-text" id="helpText" style="display:none">
  Tip: Klik na buňku = celý den jedna stavba. Pro půlden vyber „Rozdělit den“ a pak klikni zvlášť na dopoledne / odpoledne.
</p>

<div class="legend" id="legend"></div>

<div class="grid-wrapper">
  <table id="planTable">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="footer-row">
  <span class="footer-info" id="footerInfo"></span>
  <button class="btn btn-secondary" onclick="exportCSV()" style="margin-left:auto;font-size:11px">↓ CSV</button>
</div>

<!-- TODO sekce -->
<div class="todo-section" id="todoSection">
  <div class="todo-header">
    <h2>📝 Úkoly</h2>
    <span class="todo-counter" id="todoCounter"></span>
    <button class="todo-clear-btn" id="todoManageBtn" onclick="openManageAssignees()" style="display:none;margin-left:auto">
      👥 Řešitelé
    </button>
    <button class="todo-clear-btn" id="todoClearBtn" onclick="clearDoneTodos()" style="display:none">
      Smazat dokončené
    </button>
  </div>
  <div class="todo-add-row">
    <input
      type="text"
      id="todoInput"
      placeholder="Nový úkol… (např. odvézt cement na stavbu B)"
      maxlength="300"
      onkeydown="if(event.key==='Enter')addTodo()"
    >
    <button class="assignee-add-btn" id="newTodoAssigneeBtn" onclick="openNewTodoAssigneePicker(event)" style="padding:6px 12px;font-size:12px">
      + Řešitelé <span id="newTodoAssigneeCount"></span>
    </button>
    <button class="btn btn-primary" onclick="addTodo()">+ Přidat</button>
  </div>
  <div class="todo-list" id="todoList"></div>
</div>

<div class="picker" id="picker" style="display:none"></div>

<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = [
  '#d4a800', // 1  Okrová
  '#2d6a4f', // 2  Zelená lesní
  '#c0392b', // 3  Červená cihlová
  '#1a6b8a', // 4  Modrá oceánová
  '#6d4c8a', // 5  Fialová
  '#b5561f', // 6  Oranžová pálená
  '#1a5276', // 7  Modrá námořní
  '#7d6608', // 8  Olivová
  '#117a65', // 9  Tyrkysová
  '#784212', // 10 Hnědá kakaová
  '#7e1f8c', // 11 Purpurová
  '#566573', // 12 Šedá tmavá
  '#a93226', // 13 Vínová
  '#196f3d', // 14 Zelená temná
  '#ad6b1f', // 15 Karamelová
  '#34495e', // 16 Modrošedá
  '#0e6655', // 17 Smaragd
  '#9c640c', // 18 Hořčicová
  '#5b2c6f', // 19 Ametystová
  '#1c2833'  // 20 Antracit
];
const COLOR_NAMES = [
  'Okrová','Zelená lesní','Cihlová','Oceán','Fialová','Oranžová','Námořní','Olivová','Tyrkys','Kakao',
  'Purpur','Šedá','Vínová','Smrk','Karamel','Břidlice','Smaragd','Hořčice','Ametyst','Antracit'
];
const DAYS_CS = ['Ne','Po','Út','St','Čt','Pá','So'];
const MONTHS_CS = ['led','úno','bře','dub','kvě','čvn','čvc','srp','zář','říj','lis','pro'];

let isAdmin = false;
let unsaved = false;
let startOffset = 0;
let appData = { workers: [], stavby: [], assignments: {}, todos: [], assignees: [] };
let newTodoAssignees = []; // Buffer pro řešitele nového úkolu (před odesláním)
const today = new Date(); today.setHours(0,0,0,0);

function dateStr(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── DATA HELPERS ─────────────────────────────────────────
// Migrate old format (single number) to new format ({am,pm})
function getCell(wi, dStr){
  const key = `${wi}_${dStr}`;
  const v = appData.assignments[key];
  if (v === undefined || v === null) return { am: null, pm: null };
  if (typeof v === 'number') return { am: v, pm: v }; // old format
  return { am: v.am ?? null, pm: v.pm ?? null };
}
function setCell(wi, dStr, am, pm){
  const key = `${wi}_${dStr}`;
  if (am === null && pm === null) {
    delete appData.assignments[key];
  } else if (am === pm && am !== null) {
    appData.assignments[key] = { am, pm }; // full day
  } else {
    appData.assignments[key] = { am, pm };
  }
}

// ─── LOAD ─────────────────────────────────────────────────
async function loadData(){
  try {
    const r = await fetch('/api/data');
    appData = await r.json();
    if (!appData.assignments) appData.assignments = {};
    if (!Array.isArray(appData.todos)) appData.todos = [];
    if (!Array.isArray(appData.assignees)) appData.assignees = [];
    // Backward compat: doplň prázdné assignees do existujících úkolů
    appData.todos.forEach(t => {
      if (!Array.isArray(t.assignees)) t.assignees = [];
    });
  } catch(e){
    showToast('Nepodařilo se načíst data', true);
  }
  render();
  renderTodos();
}

async function saveToServer(){
  const pw = sessionStorage.getItem('adminPw') || '';
  const btn = document.getElementById('saveBtn');
  const orig = btn.textContent;
  btn.textContent = '⏳ Ukládám…';
  btn.disabled = true;
  try {
    const r = await fetch('/api/save', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw, data: appData })
    });

  updateSaveBtn();

// ─── RENDER ───────────────────────────────────────────────
function render(){
  const start = addDays(today, startOffset);
  const days = Array.from({length:14}, (_,i) => addDays(start,i));
  window._renderDays = days;

  const s=days[0], e=days[13];
  document.getElementById('weekLabel').textContent =
    `${s.getDate()}. ${MONTHS_CS[s.getMonth()]} – ${e.getDate()}. ${MONTHS_CS[e.getMonth()]} ${e.getFullYear()}`;

  // Legend
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  appData.stavby.forEach((st,i)=>{
    const el=document.createElement('div');
    el.className='legend-item';
    el.innerHTML=`<span class="legend-dot" style="background:${st.color}"></span>${escH(st.name)}`;
    if(isAdmin){
      el.innerHTML+=` <button class="btn btn-sm btn-secondary" onclick="editStavba(${i})" style="margin-left:4px">✎</button>
        <button style="color:var(--err);background:none;border:none;cursor:pointer;font-size:13px;font-weight:bold" onclick="deleteStavba(${i})" title="Smazat">×</button>`;
    }
    leg.appendChild(el);
  });
  const volEl=document.createElement('div');
  volEl.className='legend-item';
  volEl.innerHTML=`<span class="legend-dot" style="background:#c8c2b8"></span>Volno`;
  leg.appendChild(volEl);

  // Thead
  let th=`<tr><th>Člověk</th>`;
  days.forEach(d=>{
    const isWe=d.getDay()===0||d.getDay()===6;
    const isToday=dateStr(d)===dateStr(today);
    th+=`<th class="${isWe?'day-weekend':''} ${isToday?'day-today':''}">
      ${DAYS_CS[d.getDay()]}<br><span style="font-size:10px;font-weight:400">${d.getDate()}.${d.getMonth()+1}</span></th>`;
  });
  th+=`</tr>`;
  document.getElementById('thead').innerHTML=th;

  // Tbody
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';

  appData.workers.forEach((w,wi)=>{
    const tr=document.createElement('tr');
    let html=`<td class="worker-name">${escH(w)}`;
    if(isAdmin) html+=` <button style="color:var(--err);background:none;border:none;cursor:pointer;font-size:14px;font-weight:bold;margin-left:4px" onclick="deleteWorker(${wi})" title="Smazat">×</button>`;
    html+=`</td>`;

    days.forEach((d,di)=>{
      const dStr = dateStr(d);
      const cell = getCell(wi, dStr);
      const isWe=d.getDay()===0||d.getDay()===6;
      const isFull = cell.am === cell.pm;

      const renderHalf = (val) => {
        if (val === null || val === undefined) return `<div class="cell-half empty"></div>`;
        const st = appData.stavby[val];
        if (!st) return `<div class="cell-half empty"></div>`;
        return `<div class="cell-half" style="background:${st.color}">${escH(st.name.slice(0,4))}</div>`;
      };

      const cellClass = `cell ${isAdmin?'editable':''} ${isFull?'full':'split'}`;
      const onclick = isAdmin ? `onclick="openPicker(event,${wi},${di})"` : '';

      let inner;
      if (isFull && cell.am === null) {
        inner = `<div class="cell-half empty">—</div>`;
      } else if (isFull) {
        const st = appData.stavby[cell.am];
        const label = st ? st.name.slice(0,5) : '';
        const bg = st ? st.color : '#e0dcd4';
        inner = `<div class="cell-half" style="background:${bg}">${escH(label)}</div>`;
      } else {
        inner = renderHalf(cell.am) + `<div class="cell-divider"></div>` + renderHalf(cell.pm);
      }

      html+=`<td style="${isWe?'background:#edeae4':''}">
        <div class="cell-wrap">
          <div class="${cellClass}" ${onclick}>${inner}</div>
        </div>
      </td>`;
    });
    tr.innerHTML=html;
    tbody.appendChild(tr);
  });

  // Summary - počet lidí po dnech (počítáme každý půlden zvlášť, pak max)
  const sumTr=document.createElement('tr');
  sumTr.className='summary-row';
  let shtml=`<td>Obsazenost</td>`;
  days.forEach(d=>{
    const dStr = dateStr(d);
    let amCnt=0, pmCnt=0;
    appData.workers.forEach((_,wi)=>{
      const cell = getCell(wi, dStr);
      if (cell.am !== null && cell.am !== undefined) amCnt++;
      if (cell.pm !== null && cell.pm !== undefined) pmCnt++;
    });
    const max = Math.max(amCnt, pmCnt);
    shtml+=`<td>${max?`<span class="count-badge">${max}</span>`:''}</td>`;
  });
  sumTr.innerHTML=shtml;
  tbody.appendChild(sumTr);

  // Footer info
  const totalAssigned = Object.keys(appData.assignments).length;
  document.getElementById('footerInfo').textContent=
    `${appData.workers.length} lidí · ${appData.stavby.length} staveb · ${totalAssigned} přiřazení`;
}

// ─── PICKER ───────────────────────────────────────────────
function openPicker(e, wi, di){
  e.stopPropagation();
  const picker=document.getElementById('picker');
  const rect=e.currentTarget.getBoundingClientRect();
  const dStr = dateStr(window._renderDays[di]);
  const cell = getCell(wi, dStr);
  const isFull = cell.am === cell.pm;

  let html = '';

  // Sekce: Celý den
  html += `<div class="picker-section">
    <div class="picker-label">Celý den</div>`;
  appData.stavby.forEach((st,si)=>{
    const isCurrent = isFull && cell.am === si;
    html+=`<div class="picker-item" onclick="assignFull(${wi},${di},${si})" style="${isCurrent?'background:var(--bg);font-weight:500':''}">
      <span class="picker-dot" style="background:${st.color}"></span>${escH(st.name)}</div>`;
  });
  html+=`<div class="picker-item" onclick="assignFull(${wi},${di},null)">
    <span class="picker-dot" style="background:#c8c2b8;border:1px dashed #aaa"></span>Volno</div>
  </div>`;

  // Sekce: Půlden - jen pokud už není rozděleno
  if (isFull) {
    html += `<div class="picker-section">
      <div class="picker-item" onclick="splitDay(${wi},${di})">
        <span class="picker-split-icon"></span>Rozdělit den (dop / odp)
      </div>
    </div>`;
  } else {
    // Cell je rozdělený, dej možnost editovat každou půlku zvlášť
    html += `<div class="picker-section">
      <div class="picker-label">Dopoledne</div>`;
    appData.stavby.forEach((st,si)=>{
      const isCurrent = cell.am === si;
      html+=`<div class="picker-item" onclick="assignHalf(${wi},${di},'am',${si})" style="${isCurrent?'background:var(--bg);font-weight:500':''}">
        <span class="picker-dot" style="background:${st.color}"></span>${escH(st.name)}</div>`;
    });
    html+=`<div class="picker-item" onclick="assignHalf(${wi},${di},'am',null)">
      <span class="picker-dot" style="background:#c8c2b8;border:1px dashed #aaa"></span>Volno</div>
    </div>`;

    html += `<div class="picker-section">
      <div class="picker-label">Odpoledne</div>`;
    appData.stavby.forEach((st,si)=>{
      const isCurrent = cell.pm === si;
      html+=`<div class="picker-item" onclick="assignHalf(${wi},${di},'pm',${si})" style="${isCurrent?'background:var(--bg);font-weight:500':''}">
        <span class="picker-dot" style="background:${st.color}"></span>${escH(st.name)}</div>`;
    });
    html+=`<div class="picker-item" onclick="assignHalf(${wi},${di},'pm',null)">
      <span class="picker-dot" style="background:#c8c2b8;border:1px dashed #aaa"></span>Volno</div>
    </div>`;
  }

  picker.innerHTML = html;
  picker.style.display = 'block';
  picker.style.top = (rect.bottom + 4) + 'px';

  // Smart positioning - if too far right, align to viewport
  const pickerWidth = 200;
  let left = rect.left + rect.width/2;
  if (left + pickerWidth/2 > window.innerWidth - 10) left = window.innerWidth - pickerWidth/2 - 10;
  if (left - pickerWidth/2 < 10) left = pickerWidth/2 + 10;
  picker.style.left = left + 'px';
  picker.style.transform = 'translateX(-50%)';
}

function assignFull(wi, di, val){
  const dStr = dateStr(window._renderDays[di]);
  setCell(wi, dStr, val, val);
  closePicker();
  markUnsaved();
  render();
}
function assignHalf(wi, di, half, val){
  const dStr = dateStr(window._renderDays[di]);
  const cell = getCell(wi, dStr);
  if (half === 'am') setCell(wi, dStr, val, cell.pm);
  else setCell(wi, dStr, cell.am, val);
  closePicker();
  markUnsaved();
  render();
}
function splitDay(wi, di){
  const dStr = dateStr(window._renderDays[di]);
  const cell = getCell(wi, dStr);
  // Pokud je celý den prázdný, nedělíme - jen otevřeme znovu picker s editací půldnů
  if (cell.am === null && cell.pm === null) {
    // Force split state by setting one half explicitly to first stavba
    if (appData.stavby.length > 0) {
      setCell(wi, dStr, 0, null);
    }
  } else {
    // Force "split" view: nastav am=current, pm=null pokud byly stejné
    setCell(wi, dStr, cell.am, null);
  }
  closePicker();
  markUnsaved();
  render();
  // Znovu otevři picker
  setTimeout(()=>{
    const cells = document.querySelectorAll('.cell.editable');
    // Najdeme ten správný - row wi, column di+1 (kvůli sticky col)
    const tbody = document.getElementById('tbody');
    const targetCell = tbody.children[wi]?.children[di+1]?.querySelector('.cell');
    if (targetCell) {
      const rect = targetCell.getBoundingClientRect();
      const fakeEvent = { stopPropagation: ()=>{}, currentTarget: targetCell };
      openPicker(fakeEvent, wi, di);
    }
  }, 50);
}
function closePicker(){ document.getElementById('picker').style.display = 'none'; }

document.addEventListener('click', (e)=>{
  if (!e.target.closest('.picker') && !e.target.closest('.cell.editable')) {
    closePicker();
  }
});

function shiftWeek(n){ startOffset+=n; render(); }
function goToday(){ startOffset = 0; render(); }

// ─── WORKERS / STAVBY ─────────────────────────────────────
function deleteWorker(i){
  if(!confirm(`Smazat "${appData.workers[i]}" z plánu?`)) return;
  const newA={};
  Object.keys(appData.assignments).forEach(k=>{
    const m = k.match(/^(\d+)_(.+)$/);
    if (!m) return;
    const wi = parseInt(m[1]);
    if (wi === i) return;
    const newWi = wi > i ? wi - 1 : wi;
    newA[`${newWi}_${m[2]}`] = appData.assignments[k];
  });
  appData.assignments = newA;
  appData.workers.splice(i,1);
  markUnsaved(); render();
}

function deleteStavba(i){
  if(!confirm(`Smazat stavbu "${appData.stavby[i].name}"?\n\nVšechna přiřazení k této stavbě se zruší.`)) return;
  const newA={};
  Object.keys(appData.assignments).forEach(k=>{
    const v = appData.assignments[k];
    if (typeof v !== 'object' || v === null) return;
    const am = v.am === i ? null : (v.am > i ? v.am - 1 : v.am);
    const pm = v.pm === i ? null : (v.pm > i ? v.pm - 1 : v.pm);
    if (am !== null || pm !== null) newA[k] = { am, pm };
  });
  appData.assignments = newA;
  appData.stavby.splice(i,1);
  markUnsaved(); render();
}

// ─── MODAL ────────────────────────────────────────────────
let _editIdx = null;
function openModal(mode, idx){
  _editIdx = idx;
  const overlay = document.getElementById('modalOverlay');
  const modal = document.getElementById('modal');
  overlay.style.display = 'flex';

  if (mode === 'worker') {
    modal.innerHTML = `<h2>Přidat člověka</h2>
      <label>Jméno / přezdívka</label>
      <input id="mInput" type="text" placeholder="Novák" autofocus>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Zrušit</button>
        <button class="btn btn-primary" onclick="saveWorker()">Přidat</button>
      </div>`;
    setTimeout(()=>{
      const inp = document.getElementById('mInput');
      inp.focus();
      inp.onkeydown = e => { if(e.key==='Enter') saveWorker(); };
    }, 50);
  } else if (mode === 'stavba' || mode === 'editStavba') {
    const editing = mode === 'editStavba';
    const st = editing ? appData.stavby[idx] : { name: '', color: COLORS[appData.stavby.length % COLORS.length] };
    window._selColor = st.color;
    modal.innerHTML = `<h2>${editing?'Upravit stavbu':'Přidat stavbu'}</h2>
      <label>Název stavby</label>
      <input id="mInput" type="text" value="${escH(st.name)}" placeholder="Čihákova 34" autofocus>
      <label>Barva</label>
      <div class="color-row" id="colorRow"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Zrušit</button>
        <button class="btn btn-primary" onclick="saveStavba(${editing})">Uložit</button>
      </div>`;
    const cr = document.getElementById('colorRow');
    COLORS.forEach((c,i)=>{
      const s = document.createElement('div');
      s.className = 'color-swatch' + (c===st.color?' selected':'');
      s.style.background = c; s.title = COLOR_NAMES[i];
      s.onclick = () => {
        window._selColor = c;
        document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('selected'));
        s.classList.add('selected');
      };
      cr.appendChild(s);
    });
    setTimeout(()=>{
      const inp = document.getElementById('mInput');
      inp.focus(); inp.select();
      inp.onkeydown = e => { if(e.key==='Enter') saveStavba(editing); };
    }, 50);
  }
}
function saveWorker(){
  const v = document.getElementById('mInput').value.trim();
  if(!v) return;
  appData.workers.push(v); markUnsaved(); closeModal(); render();
}
function saveStavba(editing){
  const v = document.getElementById('mInput').value.trim();
  if(!v) return;
  const obj = { name: v, color: window._selColor || COLORS[0] };
  if (editing) appData.stavby[_editIdx] = obj;
  else appData.stavby.push(obj);
  markUnsaved(); closeModal(); render();
}
function editStavba(i){ openModal('editStavba', i); }
function closeModal(){ document.getElementById('modalOverlay').style.display = 'none'; }
document.getElementById('modalOverlay').onclick = function(e){ if(e.target===this) closeModal(); };

// ─── EXPORT ───────────────────────────────────────────────
function exportCSV(){
  const start = addDays(today, startOffset);
  const days = Array.from({length:14},(_,i)=>addDays(start,i));
  let csv = 'Jméno;Půlden';
  days.forEach(d => csv += `;${dateStr(d)}`);
  csv += '\n';
  appData.workers.forEach((w,wi)=>{
    // dvě řádky na člověka: dop a odp
    ['am','pm'].forEach(half=>{
      csv += `"${w}";${half==='am'?'Dop':'Odp'}`;
      days.forEach(d=>{
        const cell = getCell(wi, dateStr(d));
        const val = cell[half];
        const name = (val !== null && val !== undefined && appData.stavby[val]) ? appData.stavby[val].name : '';
        csv += `;"${name}"`;
      });
      csv += '\n';
    });
  });
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `plan_${dateStr(start)}.csv`;
  a.click();
}

// ─── TODO ─────────────────────────────────────────────────
function renderTodos(){
  const list = document.getElementById('todoList');
  const counter = document.getElementById('todoCounter');
  const clearBtn = document.getElementById('todoClearBtn');
  const manageBtn = document.getElementById('todoManageBtn');
  const todos = appData.todos || [];

  // sort: nedokončené nahoře, pak dokončené (od nejnovějších)
  const sorted = [...todos].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (a.done) return new Date(b.doneAt || 0) - new Date(a.doneAt || 0);
    return new Date(a.createdAt) - new Date(b.createdAt);
  });

  const open = todos.filter(t => !t.done).length;
  const done = todos.filter(t => t.done).length;
  counter.textContent = todos.length === 0
    ? 'žádné úkoly'
    : `${open} otevřených · ${done} hotových`;

  clearBtn.style.display = (isAdmin && done > 0) ? 'inline-block' : 'none';
  manageBtn.style.display = isAdmin ? 'inline-block' : 'none';

  // Aktualizuj počítadlo u tlačítka řešitelů pro nový úkol
  updateNewTodoAssigneeCount();

  if (sorted.length === 0) {
    list.innerHTML = `<div class="todo-empty">Zatím žádné úkoly. Přidej první výše ↑</div>`;
    return;
  }

  const knownSet = new Set(appData.assignees || []);

  list.innerHTML = sorted.map(t => {
    const created = formatRelativeDate(t.createdAt);
    const safeText = escH(t.text);
    const assignees = Array.isArray(t.assignees) ? t.assignees : [];

    // Chips pro řešitele
    const chips = assignees.map(name => {
      const isOrphan = !knownSet.has(name);
      const orphanTitle = isOrphan ? ' title="Řešitel už není v aktivním seznamu (zachovaná historie)"' : '';
      return `<span class="assignee-chip ${isOrphan?'orphan':''} removable"${orphanTitle}>
        ${escH(name)}
        <span class="assignee-chip-x" onclick="removeAssigneeFromTodo('${t.id}','${escAttr(name)}')" title="Odebrat">×</span>
      </span>`;
    }).join('');

    const addBtn = `<button class="assignee-add-btn" onclick="openTodoAssigneePicker(event,'${t.id}')">
      ${assignees.length === 0 ? '+ řešitel' : '+'}
    </button>`;

    return `<div class="todo-item ${t.done?'done':''}" data-id="${t.id}">
      <div class="todo-checkbox ${t.done?'checked':''}" onclick="toggleTodo('${t.id}')" title="${t.done?'Zrušit dokončení':'Označit jako hotové'}">
        ${t.done?'✓':''}
      </div>
      <div class="todo-text ${isAdmin?'editable':''}" ${isAdmin?`ondblclick="startEditTodo('${t.id}')"`:''} title="${isAdmin?'Dvojklik pro úpravu':''}">${safeText}</div>
      <span class="todo-meta">${created}</span>
      ${isAdmin?`<button class="todo-delete-btn" onclick="deleteTodo('${t.id}')" title="Smazat">×</button>`:''}
    </div>
    <div class="assignee-row" data-todo-id="${t.id}">
      ${chips}
      ${addBtn}
    </div>`;
  }).join('');
}

function escAttr(s){ return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function formatRelativeDate(iso){
  if (!iso) return '';
  try {
    const d = new Date(iso);
    const diffMs = Date.now() - d.getTime();
    const diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1) return 'teď';
    if (diffMin < 60) return `před ${diffMin} min`;
    const diffH = Math.floor(diffMin / 60);
    if (diffH < 24) return `před ${diffH} h`;
    const diffD = Math.floor(diffH / 24);
    if (diffD < 7) return `před ${diffD} d`;
    return `${d.getDate()}.${d.getMonth()+1}.`;
  } catch(e) { return ''; }
}

function updateNewTodoAssigneeCount(){
  const el = document.getElementById('newTodoAssigneeCount');
  if (el) el.textContent = newTodoAssignees.length > 0 ? `(${newTodoAssignees.length})` : '';
}

async function addTodo(){
  const inp = document.getElementById('todoInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.disabled = true;
  try {
    const r = await fetch('/api/todos/add', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text, assignees: newTodoAssignees })
    });
    const res = await r.json();
    if (r.ok) {
      appData.todos.push(res.todo);
      inp.value = '';
      newTodoAssignees = []; // reset bufferu
      renderTodos();
    } else {
      showToast(res.error || 'Chyba', true);
    }
  } catch(e) {
    showToast('Síťová chyba', true);
  }
  inp.disabled = false;
  inp.focus();
}

// ─── Assignee multiselect dropdown ────────────────────────
function openNewTodoAssigneePicker(e){
  e.stopPropagation();
  showAssigneePicker(e.currentTarget, newTodoAssignees, (selected)=>{
    newTodoAssignees = selected;
    updateNewTodoAssigneeCount();
  });
}

function openTodoAssigneePicker(e, todoId){
  e.stopPropagation();
  const todo = appData.todos.find(t => t.id === todoId);
  if (!todo) return;
  const current = Array.isArray(todo.assignees) ? [...todo.assignees] : [];
  showAssigneePicker(e.currentTarget, current, async (selected)=>{
    // Optimistic update
    const orig = todo.assignees;
    todo.assignees = selected;
    renderTodos();
    try {
      const r = await fetch('/api/todos/setAssignees', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ id: todoId, assignees: selected })
      });
      if (!r.ok) {
        const res = await r.json();
        todo.assignees = orig;
        showToast(res.error || 'Chyba', true);
        renderTodos();
      }
    } catch(err) {
      todo.assignees = orig;
      showToast('Síťová chyba', true);
      renderTodos();
    }
  });
}

async function removeAssigneeFromTodo(todoId, name){
  const todo = appData.todos.find(t => t.id === todoId);
  if (!todo) return;
  const newList = (todo.assignees || []).filter(a => a !== name);
  const orig = todo.assignees;
  todo.assignees = newList;
  renderTodos();
  try {
    const r = await fetch('/api/todos/setAssignees', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id: todoId, assignees: newList })
    });
    if (!r.ok) {
      todo.assignees = orig;
      showToast('Chyba', true);
      renderTodos();
    }
  } catch(e) {
    todo.assignees = orig;
    showToast('Síťová chyba', true);
    renderTodos();
  }
}

let _msState = null;
function showAssigneePicker(anchorEl, currentSelection, onApply){
  closeAssigneePicker();
  const dropdown = document.createElement('div');
  dropdown.className = 'ms-dropdown';
  dropdown.id = 'msDropdown';

  const knownAssignees = appData.assignees || [];

  // Sloučíme známé řešitele s těmi v aktuálním výběru (kvůli orphans)
  const allOptions = [...knownAssignees];
  currentSelection.forEach(n => {
    if (!allOptions.includes(n)) allOptions.push(n);
  });

  if (allOptions.length === 0) {
    dropdown.innerHTML = `<div class="ms-empty">
      Zatím žádní řešitelé.<br>
      ${isAdmin ? 'Přidej je tlačítkem <strong>👥 Řešitelé</strong> nahoře.' : 'Požádej admina o doplnění seznamu.'}
    </div>
    <div class="ms-footer">
      <button onclick="closeAssigneePicker()">Zavřít</button>
    </div>`;
  } else {
    let listHtml = '<div class="ms-list">';
    allOptions.forEach((name, i) => {
      const checked = currentSelection.includes(name);
      const isOrphan = !knownAssignees.includes(name);
      listHtml += `<div class="ms-item" onclick="toggleMsItem(${i})">
        <span class="ms-checkbox ${checked?'checked':''}" data-i="${i}">${checked?'✓':''}</span>
        <span style="${isOrphan?'font-style:italic;color:var(--muted)':''}">${escH(name)}${isOrphan?' (mimo seznam)':''}</span>
      </div>`;
    });
    listHtml += '</div>';

    dropdown.innerHTML = listHtml + `<div class="ms-footer">
      <button onclick="closeAssigneePicker()">Zrušit</button>
      <button class="primary" onclick="confirmAssigneePicker()">Použít</button>
    </div>`;
  }

  document.body.appendChild(dropdown);
  const rect = anchorEl.getBoundingClientRect();
  let top = rect.bottom + 6;
  let left = rect.left;
  // Pokud by se dropdown nevešel napravo, posuň doleva
  const ddWidth = 220;
  if (left + ddWidth > window.innerWidth - 10) {
    left = window.innerWidth - ddWidth - 10;
  }
  // Pokud nahoře taky chybí místo, dáme nad
  const ddHeight = Math.min(280, allOptions.length * 32 + 60);
  if (top + ddHeight > window.innerHeight - 10) {
    top = rect.top - ddHeight - 6;
    if (top < 10) top = 10;
  }
  dropdown.style.top = top + 'px';
  dropdown.style.left = left + 'px';

  _msState = {
    options: allOptions,
    selection: new Set(currentSelection),
    onApply
  };
}

function toggleMsItem(i){
  if (!_msState) return;
  const name = _msState.options[i];
  if (_msState.selection.has(name)) _msState.selection.delete(name);
  else _msState.selection.add(name);
  // Update checkbox UI
  const cb = document.querySelector(`.ms-checkbox[data-i="${i}"]`);
  if (cb) {
    if (_msState.selection.has(name)) {
      cb.classList.add('checked');
      cb.textContent = '✓';
    } else {
      cb.classList.remove('checked');
      cb.textContent = '';
    }
  }
}

function confirmAssigneePicker(){
  if (!_msState) return;
  const sel = Array.from(_msState.selection);
  const cb = _msState.onApply;
  closeAssigneePicker();
  cb(sel);
}

function closeAssigneePicker(){
  const el = document.getElementById('msDropdown');
  if (el) el.remove();
  _msState = null;
}

// Zavři dropdown při kliknutí mimo
document.addEventListener('click', (e) => {
  if (_msState && !e.target.closest('#msDropdown') && !e.target.closest('.assignee-add-btn')) {
    closeAssigneePicker();
  }
});

// ─── Manage assignees modal (admin) ───────────────────────
function openManageAssignees(){
  if (!isAdmin) return;
  const overlay = document.getElementById('modalOverlay');
  const modal = document.getElementById('modal');
  overlay.style.display = 'flex';
  renderManageAssigneesContent(modal);
}

function renderManageAssigneesContent(modal){
  const items = appData.assignees || [];
  const list = items.length === 0
    ? `<div class="assignee-manage-empty">Zatím žádní řešitelé. Přidej je níž.</div>`
    : items.map(name => `
        <div class="assignee-manage-item">
          <span>${escH(name)}</span>
          <button onclick="removeAssigneeFromList('${escAttr(name)}')" title="Odebrat">×</button>
        </div>
      `).join('');

  modal.innerHTML = `<h2>👥 Správa řešitelů</h2>
    <p style="font-size:11px;color:var(--muted);margin-bottom:12px">
      Seznam lidí, které lze přidělit jako řešitele úkolů.<br>
      Při odebrání zůstanou ve stávajících úkolech jako historie.
    </p>
    <div class="assignee-manage-list">${list}</div>
    <label>Přidat řešitele</label>
    <div style="display:flex;gap:6px">
      <input id="newAssigneeInput" type="text" placeholder="Jméno…" maxlength="60" autofocus style="margin-bottom:0">
      <button class="btn btn-primary" onclick="addAssigneeToList()">+</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Zavřít</button>
    </div>`;
  setTimeout(()=>{
    const inp = document.getElementById('newAssigneeInput');
    if (inp) {
      inp.focus();
      inp.onkeydown = e => { if(e.key==='Enter') { e.preventDefault(); addAssigneeToList(); } };
    }
  }, 50);
}

async function addAssigneeToList(){
  const inp = document.getElementById('newAssigneeInput');
  const name = inp.value.trim();
  if (!name) return;
  const pw = sessionStorage.getItem('adminPw') || '';
  try {
    const r = await fetch('/api/assignees/add', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw, name })
    });
    const res = await r.json();
    if (r.ok) {
      appData.assignees = res.assignees;
      inp.value = '';
      renderManageAssigneesContent(document.getElementById('modal'));
      renderTodos();
    } else {
      showToast(res.error || 'Chyba', true);
    }
  } catch(e) {
    showToast('Síťová chyba', true);
  }
}

async function removeAssigneeFromList(name){
  if (!confirm(`Odebrat „${name}" ze seznamu?\n\nZůstane v historii úkolů, kde už je přiřazen.`)) return;
  const pw = sessionStorage.getItem('adminPw') || '';
  try {
    const r = await fetch('/api/assignees/remove', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw, name })
    });
    const res = await r.json();
    if (r.ok) {
      appData.assignees = res.assignees;
      renderManageAssigneesContent(document.getElementById('modal'));
      renderTodos();
    } else {
      showToast(res.error || 'Chyba', true);
    }
  } catch(e) {
    showToast('Síťová chyba', true);
  }
}

async function toggleTodo(id){
  const todo = appData.todos.find(t => t.id === id);
  if (!todo) return;
  // Optimistic update
  const wasDone = todo.done;
  todo.done = !todo.done;
  todo.doneAt = todo.done ? new Date().toISOString() : null;
  renderTodos();
  try {
    const r = await fetch('/api/todos/toggle', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id })
    });
    if (!r.ok) {
      // Revert
      todo.done = wasDone;
      const res = await r.json();
      showToast(res.error || 'Nelze přepnout', true);
      renderTodos();
    }
  } catch(e) {
    todo.done = wasDone;
    showToast('Síťová chyba', true);
    renderTodos();
  }
}

async function deleteTodo(id){
  if (!isAdmin) return;
  const todo = appData.todos.find(t => t.id === id);
  if (!todo) return;
  if (!confirm(`Smazat úkol?\n\n"${todo.text.slice(0,80)}${todo.text.length>80?'…':''}"`)) return;
  const pw = sessionStorage.getItem('adminPw') || '';
  try {
    const r = await fetch('/api/todos/delete', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw, id })
    });
    const res = await r.json();
    if (r.ok) {
      appData.todos = appData.todos.filter(t => t.id !== id);
      renderTodos();
    } else {
      showToast(res.error || 'Nelze smazat', true);
    }
  } catch(e) {
    showToast('Síťová chyba', true);
  }
}

function startEditTodo(id){
  if (!isAdmin) return;
  const todo = appData.todos.find(t => t.id === id);
  if (!todo) return;
  const item = document.querySelector(`.todo-item[data-id="${id}"]`);
  if (!item) return;
  const textEl = item.querySelector('.todo-text');
  const original = todo.text;
  textEl.outerHTML = `<input class="todo-text-input" id="editInput-${id}" type="text" maxlength="300" value="${escH(original)}">`;
  const inp = document.getElementById(`editInput-${id}`);
  inp.focus();
  inp.select();
  let saving = false;
  const finish = async (save) => {
    if (saving) return;
    saving = true;
    if (!save || inp.value.trim() === original || !inp.value.trim()) {
      renderTodos();
      return;
    }
    const pw = sessionStorage.getItem('adminPw') || '';
    try {
      const r = await fetch('/api/todos/edit', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ password: pw, id, text: inp.value.trim() })
      });
      const res = await r.json();
      if (r.ok) {
        todo.text = res.todo.text;
        renderTodos();
      } else {
        showToast(res.error || 'Nelze uložit', true);
        renderTodos();
      }
    } catch(e) {
      showToast('Síťová chyba', true);
      renderTodos();
    }
  };
  inp.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); finish(true); }
    else if (e.key === 'Escape') { finish(false); }
  };
  inp.onblur = () => finish(true);
}

async function clearDoneTodos(){
  if (!isAdmin) return;
  const doneCount = appData.todos.filter(t => t.done).length;
  if (doneCount === 0) return;
  if (!confirm(`Smazat všech ${doneCount} dokončených úkolů?`)) return;
  const pw = sessionStorage.getItem('adminPw') || '';
  try {
    const r = await fetch('/api/todos/clearDone', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw })
    });
    if (r.ok) {
      appData.todos = appData.todos.filter(t => !t.done);
      renderTodos();
      showToast(`✓ Smazáno ${doneCount} úkolů`);
    } else {
      const res = await r.json();
      showToast(res.error || 'Chyba', true);
    }
  } catch(e) {
    showToast('Síťová chyba', true);
  }
}

// Pravidelně přerenderuj relativní časy ("před 5 min" -> "před 6 min")
setInterval(() => {
  if (appData.todos && appData.todos.length > 0) renderTodos();
}, 60000);

// Před opuštěním stránky upozorni na neuložené plán-změny
window.addEventListener('beforeunload', (e) => {
  if (unsaved && isAdmin) {
    e.preventDefault();
    e.returnValue = '';
  }
});
